<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Sign2Text - Live Conferencing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #ec4899;
            --secondary-hover: #db2777;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
        }

        /* Glassmorphism utility */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }

        /* Header */
        header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #3b82f6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            box-shadow: 0 0 0 rgba(0,0,0,0);
        }
        
        .status-indicator.connected .status-dot {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        /* Main Container */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
            padding: 2rem 5%;
            flex: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        @media (max-width: 992px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Video Section */
        .video-container {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 480px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            background: #000;
        }

        #processedVideoFeed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.5s ease;
        }

        .overlay-loader {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            z-index: 10;
            gap: 1rem;
            backdrop-filter: blur(5px);
        }
        
        .overlay-loader i {
            font-size: 3rem;
            color: var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        /* Controls Section */
        .controls-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.75rem;
            margin-bottom: 0.5rem;
        }

        /* Inputs and Buttons */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        button {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: var(--secondary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }

        .btn-clean {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-clean:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /* Subtitles & Transcription box */
        .transcription-box {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 1rem;
            min-height: 150px;
            font-size: 1.25rem;
            font-weight: 500;
            line-height: 1.5;
            color: white;
            border: 1px solid var(--glass-border);
            overflow-y: auto;
            position: relative;
        }
        
        .transcription-box:empty::before {
            content: "Waiting for translation...";
            color: var(--text-muted);
            font-style: italic;
            font-size: 1rem;
        }

        .live-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .live-badge.active {
            opacity: 1;
        }

        .live-badge i {
            animation: pulse-dot 1s infinite alternate;
        }

        @keyframes pulse-dot {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

    </style>
</head>

<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-hands-asl-interpreting"></i>
            Sign2Text Live
        </div>
        <div class="status-indicator" id="navStatus">
            <div class="status-dot"></div>
            <span id="navStatusText">Not Connected</span>
        </div>
    </header>

    <div class="main-container">
        
        <!-- Main Video Area -->
        <div class="video-container glass">
            <!-- Used strictly to capture device camera frame (hidden visually) -->
            <video id="localVideo" autoplay playsinline style="display: none;"></video>
            <canvas id="localCanvas" style="display: none;"></canvas>
            
            <div class="live-badge" id="liveBadge"><i class="fa-solid fa-circle"></i> LIVE</div>
            
            <img id="processedVideoFeed" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Feed">
            
            <div id="overlayLoader" class="overlay-loader">
                <i class="fa-solid fa-video"></i>
                <h3 class="text-white" style="font-weight: 500;">Join a Room to start</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Waiting for connection...</p>
            </div>
        </div>

        <!-- Sidebar / Controls Area -->
        <div class="controls-sidebar">
            
            <!-- Connection Panel -->
            <div class="panel glass">
                <div class="panel-title">
                    <i class="fa-solid fa-network-wired" style="color: var(--primary)"></i> Room Setup
                </div>
                
                <div class="input-group">
                    <label for="roomId">Room ID</label>
                    <input type="text" id="roomId" placeholder="Enter room code (e.g., 1234)" value="1234" autocomplete="off">
                </div>
                
                <div class="btn-group">
                    <button id="btnJoinSigner" class="btn-primary" title="Use constraints web camera as sender">
                        <i class="fa-solid fa-camera"></i> Signer
                    </button>
                    <button id="btnJoinViewer" class="btn-secondary" title="Watch connection feed without camera">
                        <i class="fa-solid fa-eye"></i> Viewer
                    </button>
                </div>
            </div>

            <!-- Translation Output Panel -->
            <div class="panel glass" style="flex: 1;">
                <div class="panel-title" style="justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <i class="fa-solid fa-language" style="color: var(--secondary)"></i> Live Translation
                    </div>
                </div>
                
                <div id="transcriptionBox" class="transcription-box"></div>
                
                <div class="btn-group" style="margin-top: auto;">
                    <button id="speakButton" class="btn-clean">
                        <i class="fa-solid fa-volume-up"></i> Speak
                    </button>
                    <button id="resetButton" class="btn-danger">
                        <i class="fa-solid fa-trash"></i> Clear
                    </button>
                </div>
            </div>

        </div>
    </div>


    <!-- Socket.io Library -->
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
    
    <script>
        const socket = io();
        const localVideo = document.getElementById('localVideo');
        const localCanvas = document.getElementById('localCanvas');
        const ctx = localCanvas.getContext('2d', { willReadFrequently: true });
        
        const processedImage = document.getElementById('processedVideoFeed');
        const navStatus = document.getElementById('navStatus');
        const navStatusText = document.getElementById('navStatusText');
        const overlayLoader = document.getElementById('overlayLoader');
        const transcriptionBox = document.getElementById('transcriptionBox');
        const liveBadge = document.getElementById('liveBadge');
        
        let streaming = false;
        let lastWord = "";
        let sentence = "";
        let isSigner = false;
        
        let constraints = { video: { width: 640, height: 480, facingMode: "user" } };

        // Helper: Update UI connection state
        function setConnectedState(room, role) {
            navStatus.classList.add('connected');
            navStatusText.textContent = `Room ${room} (${role})`;
            overlayLoader.style.display = 'none';
            liveBadge.classList.add('active');
        }

        // Action: Join as Signer
        document.getElementById('btnJoinSigner').addEventListener('click', async () => {
            const room = document.getElementById('roomId').value.trim();
            if(!room) return alert("Please enter a Room ID");
            
            isSigner = true;
            socket.emit('join', { room: room });
            setConnectedState(room, "Signer");

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                localVideo.srcObject = stream;
                localVideo.play();
                streaming = true;
                
                localVideo.addEventListener('playing', () => {
                    localCanvas.width = localVideo.videoWidth;
                    localCanvas.height = localVideo.videoHeight;
                    requestAnimationFrame(sendFrame);
                });
            } catch (err) {
                console.error("Camera error:", err);
                alert("Camera access was denied or failed to load.");
            }
        });

        // Action: Join as Viewer
        document.getElementById('btnJoinViewer').addEventListener('click', () => {
            const room = document.getElementById('roomId').value.trim();
            if(!room) return alert("Please enter a Room ID");
            
            isSigner = false;
            streaming = false;
            
            // Turn off local camera if it was on
            if(localVideo.srcObject) {
                localVideo.srcObject.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
            }

            socket.emit('join', { room: room });
            setConnectedState(room, "Viewer");
        });

        // Loop: Extract frames and send over Socket
        function sendFrame() {
            if (!streaming || !isSigner) return;
            
            const room = document.getElementById('roomId').value;
            
            // Draw current video frame to hidden canvas
            ctx.drawImage(localVideo, 0, 0, localCanvas.width, localCanvas.height);
            
            // Compress significantly to avoid saturating Websocket (0.4 JPEG quality)
            const dataUrl = localCanvas.toDataURL('image/jpeg', 0.4); 
            
            socket.emit('image', { image: dataUrl, room: room });
            
            // Cap to ~10-15 FPS for the backend ML Processing
            setTimeout(() => requestAnimationFrame(sendFrame), 80); 
        }

        // On Receive: Processed Remote Frame
        socket.on('processed_image', function(data) {
            // Set image source instantly
            processedImage.src = data.image;
        });

        // On Receive: Text Prediction
        socket.on('prediction', function (data) {
            // Only append if it's a new word to avoid machine-gunning characters
            if(data.text && data.text !== lastWord) {
                lastWord = data.text;
                sentence += data.text + " ";
                transcriptionBox.innerText = sentence;
                
                // Auto scroll to bottom
                transcriptionBox.scrollTop = transcriptionBox.scrollHeight;
            }
        });

        // Clear Translation
        document.getElementById('resetButton').addEventListener('click', function () {
            sentence = "";
            lastWord = "";
            transcriptionBox.innerText = '';
        });

        // Speak Translation
        document.getElementById('speakButton').addEventListener('click', function() {
            if(!sentence) return;
            
            // Cancel any current speech and start new
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(sentence.trim());
            const voices = speechSynthesis.getVoices();
            
            // Try to pick a natural English voice
            let preferredVoice = voices.find(v => v.name.includes('Google UK English Female') || v.name.includes('Samantha') || v.lang === 'en-US');
            if (preferredVoice) utterance.voice = preferredVoice;
            
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            
            window.speechSynthesis.speak(utterance);
        });
        
        // Ensure voices load handles weird browser async behavior
        speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices() };
    </script>
</body>
</html>
